<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CRM-style Candidate Dashboard for managing and filtering job candidates through the hiring pipeline.">
  <title>Candidate CRM Dashboard — KOTS Hiring</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header" id="header">
    <div class="header__left">
      <div class="header__logo">
        <span class="header__logo-icon">👥</span>
        <div>
          <h1 class="header__title">Candidate Dashboard</h1>
          <p class="header__subtitle">KOTS Hiring Pipeline</p>
        </div>
      </div>
    </div>
    <div class="header__right">
      <div class="search-box" id="searchBox">
        <svg class="search-box__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-box__input" id="searchInput" placeholder="Search by name or email..." autocomplete="off">
        <button class="search-box__clear" id="searchClear" title="Clear search" aria-label="Clear search">&times;</button>
      </div>
    </div>
  </header>

  <!-- ===== Status Summary Cards ===== -->
  <section class="status-cards" id="statusCards"></section>

  <!-- ===== Filter Bar ===== -->
  <section class="filters" id="filtersBar">
    <div class="filters__row">
      <div class="filter-group" id="filterStatus"></div>
      <div class="filter-group filter-group--yoe">
        <label class="filter-label">YOE Range</label>
        <div class="yoe-inputs">
          <input type="number" class="input-number" id="yoeMin" placeholder="Min" min="0" max="50">
          <span class="yoe-separator">–</span>
          <input type="number" class="input-number" id="yoeMax" placeholder="Max" min="0" max="50">
        </div>
      </div>
      <div class="filter-group" id="filterLocation"></div>
      <div class="filter-group" id="filterSkills"></div>
      <button class="btn btn--reset" id="btnResetFilters" title="Reset all filters">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Reset All
      </button>
    </div>
    <div class="filters__active" id="activeFilters"></div>
  </section>

  <!-- ===== Results Bar ===== -->
  <section class="results-bar" id="resultsBar">
    <span class="results-bar__count" id="resultsCount"></span>
  </section>

  <!-- ===== Candidate Table ===== -->
  <main class="table-wrapper" id="tableWrapper">
    <table class="table" id="candidateTable">
      <thead>
        <tr>
          <th class="table__th" data-sort="name">Name <span class="sort-icon"></span></th>
          <th class="table__th" data-sort="email">Email <span class="sort-icon"></span></th>
          <th class="table__th" data-sort="primary_role">Role <span class="sort-icon"></span></th>
          <th class="table__th table__th--center" data-sort="years_of_experience">YOE <span class="sort-icon"></span></th>
          <th class="table__th" data-sort="current_location">Location <span class="sort-icon"></span></th>
          <th class="table__th table__th--center" data-sort="current_status">Status <span class="sort-icon"></span></th>
          <th class="table__th" data-sort="source">Source <span class="sort-icon"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <div class="empty-state__icon">🔍</div>
      <h3 class="empty-state__title">No candidates found</h3>
      <p class="empty-state__text">Try adjusting your search or filters to find what you're looking for.</p>
      <button class="btn btn--ghost" id="btnEmptyReset">Clear all filters</button>
    </div>
  </main>

  <!-- ===== Detail Panel Overlay ===== -->
  <div class="panel-overlay" id="panelOverlay"></div>

  <!-- ===== Detail Panel ===== -->
  <aside class="detail-panel" id="detailPanel">
    <div class="panel__header" id="panelHeader"></div>
    <div class="panel__body" id="panelBody"></div>
    <div class="panel__footer" id="panelFooter"></div>
  </aside>

  <!-- ===== Toast Container ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
